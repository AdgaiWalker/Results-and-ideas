            - generic [ref=e54]:
              - paragraph [ref=e55]:
                - text: 架构层面的做减法，核心是
                - strong [ref=e56]: 减少概念数量
                - text: 。
              - paragraph [ref=e57]: 一个好的系统应该能用最少的抽象概念解释清楚。如果一个系统需要 10 个概念才能让人理解，那不是复杂，是过度设计。3-5 个核心概念就够了。
              - paragraph [ref=e58]: Unix 哲学为什么好用？因为它只有几个概念：文件、进程、管道。所有复杂的东西都是这几个概念的组合。
        - generic [ref=e59]:
          - generic [ref=e60]: W
          - generic [ref=e61]:
            - generic [ref=e62]: Walker
            - paragraph [ref=e64]: 所以做减法不是「少做」，是「想清楚再做」。
        - generic [ref=e65]:
