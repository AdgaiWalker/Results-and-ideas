          - generic [ref=e32]:
            - generic [ref=e33]: Walker
            - paragraph [ref=e35]: 做减法这件事，奥卡姆剃刀说「如无必要勿增实体」，但什么是「必要」？谁来定义？
        - generic [ref=e36]:
          - generic [ref=e37]: AI
          - generic [ref=e38]:
            - generic [ref=e39]: Claude
            - generic [ref=e40]:
              - paragraph [ref=e41]:
                - text: 这是个核心问题。「必要」不是一个客观属性，它取决于你当前的目标。同一个功能，对 A 是必要的，对 B 是冗余的。所以做减法的第一步不是删东西，而是
                - strong [ref=e42]: 明确你在为谁解决什么问题
                - text: 。
              - paragraph [ref=e43]: 没有目标，就没有「必要」的定义，做减法就变成了随机删。
        - generic [ref=e44]:
          - generic [ref=e45]: W
          - generic [ref=e46]:
            - generic [ref=e47]: Walker
            - paragraph [ref=e49]: 那从系统设计角度呢？不是具体功能，而是架构层面。
        - generic [ref=e50]:
